<script>
/* PHASE 1 MOBILE INTERACTIONS */
(function(){
  'use strict';
  
  if (!document.querySelector(".mobile-menu-toggle")) {
    var btn = document.createElement("button");
    btn.className = "mobile-menu-toggle";
    btn.innerHTML = "☰";
    btn.setAttribute("aria-label", "Toggle menu");
    btn.onclick = function() {
      var sb = document.getElementById("sidebar");
      if (sb) sb.classList.toggle("mobile-open");
    };
    document.body.appendChild(btn);
  }
  
  var sidebar = document.getElementById("sidebar");
  if (sidebar) {
    sidebar.addEventListener("click", function(e) {
      var el = e.target;
      while (el && el !== sidebar) {
        var onc = el.getAttribute && el.getAttribute("onclick");
        if (onc && onc.indexOf("openTemplePopup") !== -1) {
          if (window.innerWidth < 900) {
            setTimeout(function() { sidebar.classList.remove("mobile-open"); }, 150);
          }
          break;
        }
        el = el.parentElement;
      }
    });
  }
  
document.addEventListener("click", function(e) {
    /* STEP_4_7_CAPTURE_MARK — install capture-phase marker (survives DOM re-render) */
    if (!window._sidebarCaptureInstalled) {
      window._sidebarCaptureInstalled = true;
      var _sb = document.getElementById("sidebar");
      if (_sb) {
        _sb.addEventListener("click", function(evt) {
          evt._handledBySidebar = true;
        }, true);
      }
    }

    /* STEP_4_5_FIXES — properly check if click is outside sidebar */
    if (window.innerWidth < 900 && sidebar && sidebar.classList.contains("mobile-open")) {
      /* STEP_4_7_CAPTURE_MARK — check event marking that survives DOM re-render */
      var ham = document.querySelector(".mobile-menu-toggle");
      var isMarkedInSidebar = e._handledBySidebar === true;
      var isInSidebar = sidebar.contains(e.target);
      var isOnHamburger = ham && ham.contains(e.target);
      
      // Only close if click was OUTSIDE sidebar AND outside hamburger
      // Marking survives DOM re-render (chip click destroys clicked element before document listener runs)
      if (!isMarkedInSidebar && !isInSidebar && !isOnHamburger) {
        sidebar.classList.remove("mobile-open");
      }
    }
  });
  
  function initJourney() {
    var panel = document.getElementById("journey-panel");
    var jbtn = document.getElementById("journey-minimize-btn");
    if (!panel || !jbtn) { setTimeout(initJourney, 100); return; }
    if (window.innerWidth < 900) {
      panel.classList.remove("expanded");
      jbtn.textContent = "+";
    } else {
      panel.classList.add("expanded");
      jbtn.textContent = "−";
    }
    var freshBtn = jbtn.cloneNode(true);
    jbtn.parentNode.replaceChild(freshBtn, jbtn);
    freshBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      var ex = panel.classList.toggle("expanded");
      freshBtn.textContent = ex ? "−" : "+";
    });
  }
  
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initJourney);
  } else {
    initJourney();
  }
  
  var resizeTO;
  window.addEventListener("resize", function() {
    clearTimeout(resizeTO);
    resizeTO = setTimeout(initJourney, 200);
  });
})();
</script>

<script>
/* GOAL 2: Related tab CTA tagger */
(function() {
  function tagRelatedCards() {
    var cards = document.querySelectorAll(".related-link, [class*=\"related-item\"]");
    if (cards.length === 0) return;
    cards.forEach(function(card) {
      if (card.hasAttribute("data-cta")) return;
      var text = (card.textContent || "").toLowerCase();
      var type = "default";
      var cta = "Explore All";
      if (text.indexOf("compare") !== -1) {
        type = "compare"; cta = "Compare Side-By-Side";
      } else if (text.indexOf("share") !== -1) {
        type = "share"; cta = "Share This Temple";
      } else {
        var numMatch = text.match(/(\d+)\s+(pancha|swayamvyakta|andal|thiruppavai|krishnam|naranyam|kanchi|rangam|divya)/i);
        var otherMatch = text.match(/other\s+(\d+)\s+temples/i);
        if (numMatch) cta = "Explore " + numMatch[1] + " Temples";
        else if (otherMatch) cta = "View All " + otherMatch[1];
      }
      card.setAttribute("data-type", type);
      card.setAttribute("data-cta", cta);
    });
  }
  
  var panel = document.getElementById("detail-panel");
  if (panel) {
    var observer = new MutationObserver(function() {
      setTimeout(tagRelatedCards, 50);
    });
    observer.observe(panel, { childList: true, subtree: true });
  }
  
  if (document.readyState !== "loading") {
    tagRelatedCards();
  } else {
    document.addEventListener("DOMContentLoaded", tagRelatedCards);
  }
})();
</script>

<script>
/* LANGUAGE TOGGLE LOGIC START */
(function() {
  "use strict";
  
  // Global language state
  window.currentLanguage = "en";
  
  // Fetch stored preference
  try {
    var stored = localStorage.getItem("dd_language");
    if (stored === "ta" || stored === "en") {
      window.currentLanguage = stored;
    }
  } catch(e) {}
  
  // Field-level bilingual accessor
  // Returns _ta variant if in Tamil mode AND _ta exists; else English
  window.getFieldValue = function(temple, field) {
    /* FALLBACK_CASCADE_v2 + REGION_TAMIL_LOOKUP_v3 */
    if (!temple || !field) return "";
    
    if (window.currentLanguage === "ta") {
      // 1. Try exact _ta variant first (e.g., temple_name_short_ta)
      var taKey = field + "_ta";
      if (temple[taKey] !== undefined && temple[taKey] !== null && temple[taKey] !== "") {
        return temple[taKey];
      }
      
      // 2. Special case: region field uses REGION_TAMIL lookup dictionary
      if (field === "region" && window.REGION_TAMIL) {
        var regionVal = temple[field];
        if (regionVal && window.REGION_TAMIL[regionVal]) {
          return window.REGION_TAMIL[regionVal];
        }
      }
      
      // 3. Cascade fallback: for "_short" fields, try the base _ta
      if (field.indexOf("_short") !== -1) {
        var baseField = field.replace("_short", "");
        var baseTaKey = baseField + "_ta";
        if (temple[baseTaKey] !== undefined && temple[baseTaKey] !== null && temple[baseTaKey] !== "") {
          return temple[baseTaKey];
        }
      }
      
      // 4. For _sa (Sanskrit) fields in TA mode, try _sa_ta variant
      if (field.indexOf("_sa") !== -1) {
        var saTaKey = field + "_ta";
        if (temple[saTaKey] !== undefined && temple[saTaKey] !== null && temple[saTaKey] !== "") {
          return temple[saTaKey];
        }
      }
    }
    
    // 5. Fallback: return English/original value
    return temple[field] !== undefined ? temple[field] : "";
  };
  
  // Array-level bilingual accessor (for arrays like distinctive_features)
  window.getFieldArray = function(temple, field) {
    var value = window.getFieldValue(temple, field);
    return Array.isArray(value) ? value : [];
  };
  
  // Switch language
  window.switchLanguage = function(lang) {
    if (lang !== "en" && lang !== "ta") return;
    window.currentLanguage = lang;
    
    // Update body class
    document.body.classList.remove("lang-en", "lang-ta");
    document.body.classList.add("lang-" + lang);
    
    // Update button states
    var enBtn = document.getElementById("lang-en");
    var taBtn = document.getElementById("lang-ta");
    if (enBtn) enBtn.classList.toggle("active", lang === "en");
    if (taBtn) taBtn.classList.toggle("active", lang === "ta");
    
    // Persist
    try { localStorage.setItem("dd_language", lang); } catch(e) {}
    
    // LIVE RERENDER PATCH — re-render currently open popup with new language
    /* REBUILD_SIDEBAR_v4 — refresh temple list to reflect language change */
    if (typeof window.buildSidebar === "function") {
      try { window.buildSidebar(); } catch(e) { console.warn("[lang] buildSidebar error:", e.message); }
    } else if (typeof window.buildSidebarList === "function") {
      try { window.buildSidebarList(); } catch(e) { console.warn("[lang] buildSidebarList error:", e.message); }
    }
    
    var panel = document.getElementById("detail-panel");
    if (panel && panel.classList.contains("active") && window.currentPopupSno) {
      /* PRESERVE_ACTIVE_TAB_v3 — remember active tab before re-render */
      var activeTabBtn = document.querySelector(".tab.active");
      var savedTabName = null;
      if (activeTabBtn) {
        var onc = activeTabBtn.getAttribute("onclick") || "";
        var startQuote = onc.indexOf("switchTab(");
        if (startQuote !== -1) {
          var afterOpen = onc.substring(startQuote + 10);
          var nameMatch = afterOpen.match(/[a-z_]+/);
          if (nameMatch) savedTabName = nameMatch[0];
        }
      }
      
      if (typeof window.openTemplePopup === "function") {
        window.openTemplePopup(window.currentPopupSno);
        
        if (savedTabName && savedTabName !== "sthala") {
          setTimeout(function() {
            if (window.DDPopup && typeof window.DDPopup.switchTab === "function") {
              window.DDPopup.switchTab(savedTabName);
            } else {
              var tabBtns = document.querySelectorAll(".tab");
              for (var i = 0; i < tabBtns.length; i++) {
                var btnOnc = tabBtns[i].getAttribute("onclick") || "";
                if (btnOnc.indexOf(savedTabName) !== -1) {
                  tabBtns[i].click();
                  break;
                }
              }
            }
          }, 50);
        }
      }
    }
    
console.log("[lang] Switched to: " + lang);
  };
  
  // Initialize on DOM ready
  function initToggle() {
    document.body.classList.add("lang-" + window.currentLanguage);
    var enBtn = document.getElementById("lang-en");
    var taBtn = document.getElementById("lang-ta");
    if (enBtn) enBtn.classList.toggle("active", window.currentLanguage === "en");
    if (taBtn) taBtn.classList.toggle("active", window.currentLanguage === "ta");
  }
  
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initToggle);
  } else {
    initToggle();
  }
})();
/* LANGUAGE TOGGLE LOGIC END */
</script>

<script>
/* STEP_5_MAP_MARKERS — Marker plotting + cluster + filter sync */
(function() {
  'use strict';
  
  var NADU_COLORS_MAP = {
    'Chola Nadu': '#1E5AA0',
    'Thondai Nadu': '#4A7C4E',
    'Pandya Nadu': '#B8710A',
    'Malai Nadu': '#0F6B70',
    'Vada Nadu': '#4A148C',
    'Nadu Nadu': '#6B5DB8',
    'Abhimana Kshetram': '#C89932'
  };
  
  window.templeMarkersGroup = null;
  window.templeMarkersMap = {};
  
  function createMarkerIcon(temple) {
    var color = temple.is_abhimana 
      ? NADU_COLORS_MAP['Abhimana Kshetram'] 
      : (NADU_COLORS_MAP[temple.region] || '#666');
    var display = temple.is_abhimana ? '★' : temple.sno;
    return L.divIcon({
      html: '<div class="dd-map-marker" style="background:' + color + ';">' + display + '</div>',
      className: 'dd-map-marker-wrapper',
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });
  }
  
  function initMapMarkers() {
    /* STEP_5_4_FULL_FEATURE — Complete: pulse + preview + sidebar sync + Nadu clusters + disambiguation */
    if (!window.leafletMap || typeof L === 'undefined' || typeof L.markerClusterGroup === 'undefined') {
      setTimeout(initMapMarkers, 200);
      return;
    }
    if (!window.DIVYA_DESAMS || !window.DIVYA_DESAMS.length) {
      setTimeout(initMapMarkers, 200);
      return;
    }
    
    if (window.templeMarkersGroup) {
      console.log('[map] Resetting existing marker state...');
      try {
        window.leafletMap.removeLayer(window.templeMarkersGroup);
      } catch(e) {
        console.warn('[map] Error removing old cluster group:', e.message);
      }
      window.templeMarkersGroup = null;
      window.templeMarkersMap = {};
    }
    
    if (typeof window.selectedTempleSno === 'undefined') {
      window.selectedTempleSno = null;
    }
    
    console.log('[map] Initializing markers for ' + window.DIVYA_DESAMS.length + ' temples...');
    
    var NADU_COLORS = {
      'Chola Nadu': '#1E5AA0',
      'Thondai Nadu': '#4A7C4E',
      'Pandya Nadu': '#B8710A',
      'Malai Nadu': '#0F6B70',
      'Vada Nadu': '#4A148C',
      'Nadu Nadu': '#6B5DB8'
    };
    var NADU_CLUSTER_CLASSES = {
      'Chola Nadu': 'dd-cluster-chola',
      'Thondai Nadu': 'dd-cluster-thondai',
      'Pandya Nadu': 'dd-cluster-pandya',
      'Malai Nadu': 'dd-cluster-malai',
      'Vada Nadu': 'dd-cluster-vada',
      'Nadu Nadu': 'dd-cluster-nadu'
    };
    
    var group = L.markerClusterGroup({
      iconCreateFunction: function(cluster) {
        var count = cluster.getChildCount();
        var markers = cluster.getAllChildMarkers();
        var naduCounts = {};
        for (var k = 0; k < markers.length; k++) {
          var mrk = markers[k];
          if (mrk._templeRegion && mrk._templeRegion !== '__abhimana__') {
            naduCounts[mrk._templeRegion] = (naduCounts[mrk._templeRegion] || 0) + 1;
          }
        }
        var distinctNadus = Object.keys(naduCounts);
        var clusterClass = '';
        if (distinctNadus.length === 1 && NADU_CLUSTER_CLASSES[distinctNadus[0]]) {
          clusterClass = ' ' + NADU_CLUSTER_CLASSES[distinctNadus[0]];
        }
        return L.divIcon({
          html: '<div class="dd-cluster-marker' + clusterClass + '">' + count + '</div>',
          className: 'dd-cluster-wrapper',
          iconSize: [50, 50]
        });
      },
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      maxClusterRadius: 55,
      zoomToBoundsOnClick: true
    });
    
    var plotted = 0;
    var seenSnos = {};
    
    window.DIVYA_DESAMS.forEach(function(temple) {
      if (temple.is_celestial) return;
      if (!temple.lat || !temple.lng) return;
      
      if (seenSnos[temple.sno]) {
        console.warn('[map] Duplicate sno detected: ' + temple.sno + ' — "' + (temple.temple_name_short || temple.temple_name) + '" ignored');
        return;
      }
      seenSnos[temple.sno] = temple.temple_name_short || temple.temple_name;
      
      var color;
      if (temple.is_abhimana) {
        color = '#C89932';
      } else {
        color = NADU_COLORS[temple.region] || '#666';
      }
      var display = temple.is_abhimana ? '★' : temple.sno;
      var icon = L.divIcon({
        html: '<div class="dd-map-marker" style="background:' + color + ';">' + display + '</div>',
        className: 'dd-map-marker-wrapper',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
      
      var marker = L.marker([temple.lat, temple.lng], { icon: icon });
      marker._templeRegion = temple.is_abhimana ? '__abhimana__' : temple.region;
      
      var tooltipText = (typeof window.getFieldValue === 'function')
        ? (window.getFieldValue(temple, 'temple_name_short') || window.getFieldValue(temple, 'temple_name'))
        : (temple.temple_name_short || temple.temple_name);
      
      marker.bindTooltip(tooltipText, { 
        direction: 'top', 
        offset: [0, -12], 
        className: 'dd-map-tooltip' 
      });
      
      var previewHtml = buildPreviewCardHtml(temple);
      marker.bindPopup(previewHtml, {
        className: 'dd-map-preview-popup',
        closeButton: false,
        autoPan: false,
        offset: [0, -8],
        maxWidth: 280
      });
      
      var hoverTimer = null;
      marker.on('mouseover', function() {
        if (window.innerWidth < 900) return;
        clearTimeout(hoverTimer);
        var mrk = this;
        hoverTimer = setTimeout(function() {
          mrk.openPopup();
        }, 200);
      });
      marker.on('mouseout', function() {
        clearTimeout(hoverTimer);
        this.closePopup();
      });
      
      (function(sno) {
        marker.on('click', function() {
          window.selectedTempleSno = sno;
          applyMarkerSelection(sno);
          highlightSidebarEntry(sno);
        });
      })(temple.sno);
      
      window.templeMarkersMap[temple.sno] = marker;
      group.addLayer(marker);
      plotted++;
    });
    
    window.templeMarkersGroup = group;
    window.leafletMap.addLayer(group);
    
    if (plotted > 0 && !window._mapAutoFitted) {
      var bounds = group.getBounds();
      if (bounds && bounds.isValid()) {
        window.leafletMap.fitBounds(bounds, { padding: [50, 50], maxZoom: 8 });
        window._mapAutoFitted = true;
      }
    }
    
    console.log('[map] Plotted ' + plotted + ' temple markers (Full Feature + Nadu clusters + disambiguation)');
    setupMapSync();
    setupSidebarToMapSync();
    
    if (window.selectedTempleSno) {
      applyMarkerSelection(window.selectedTempleSno);
      highlightSidebarEntry(window.selectedTempleSno);
    }
  }
  
  function buildPreviewCardHtml(temple) {
    var gfv = window.getFieldValue || function(t, f) { return t[f] || ''; };
    var NC = {
      'Chola Nadu': '#1E5AA0',
      'Thondai Nadu': '#4A7C4E',
      'Pandya Nadu': '#B8710A',
      'Malai Nadu': '#0F6B70',
      'Vada Nadu': '#4A148C',
      'Nadu Nadu': '#6B5DB8'
    };
    var badgeColor = temple.is_abhimana ? '#C89932' : (NC[temple.region] || '#666');
    var badgeDisplay = temple.is_abhimana ? '★' : temple.sno;
    var name = gfv(temple, 'temple_name_short') || gfv(temple, 'temple_name') || '';
    var town = gfv(temple, 'town') || '';
    var regionLabel;
    if (temple.is_abhimana) {
      regionLabel = 'Abhimana Kshetram';
    } else {
      regionLabel = gfv(temple, 'region') || temple.region || '';
    }
    var tagline = gfv(temple, 'sthala_purana_tagline') || '';
    
    var html = '<div class="dd-preview-card">';
    html += '<div class="dd-preview-card-header">';
    html += '<div class="dd-preview-card-badge" style="background:' + badgeColor + ';">' + badgeDisplay + '</div>';
    html += '<div class="dd-preview-card-titles">';
    html += '<div class="dd-preview-card-name">' + escapeHtmlLocal(name) + '</div>';
    if (town) {
      html += '<div class="dd-preview-card-town">' + escapeHtmlLocal(town) + '</div>';
    }
    if (regionLabel) {
      html += '<span class="dd-preview-card-nadu" style="border-color:' + badgeColor + '; color:' + badgeColor + '; background:' + badgeColor + '15;">' + escapeHtmlLocal(regionLabel) + '</span>';
    }
    html += '</div></div>';
    if (tagline) {
      html += '<div class="dd-preview-card-tagline">' + escapeHtmlLocal(tagline) + '</div>';
    }
    html += '</div>';
    return html;
  }
  
  function escapeHtmlLocal(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  
  function applyMarkerSelection(sno) {
    document.querySelectorAll('.dd-map-marker-selected').forEach(function(el) {
      el.classList.remove('dd-map-marker-selected');
    });
    var marker = window.templeMarkersMap[sno];
    if (marker && marker._icon) {
      var innerMarker = marker._icon.querySelector('.dd-map-marker');
      if (innerMarker) {
        innerMarker.classList.add('dd-map-marker-selected');
        innerMarker.style.animation = 'none';
        setTimeout(function() {
          innerMarker.style.animation = '';
        }, 10);
      }
    }
  }
  
  function highlightSidebarEntry(sno) {
    document.querySelectorAll('.dd-temple-entry.dd-entry-highlighted').forEach(function(el) {
      el.classList.remove('dd-entry-highlighted');
    });
    var entries = document.querySelectorAll('.dd-temple-entry');
    for (var i = 0; i < entries.length; i++) {
      var onclickAttr = entries[i].getAttribute('onclick') || '';
      var match = onclickAttr.match(/openTemplePopup\((\d+)\)/);
      if (match && parseInt(match[1], 10) === sno) {
        entries[i].classList.add('dd-entry-highlighted');
        entries[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        break;
      }
    }
  }
  
  function setupSidebarToMapSync() {
    var templeList = document.getElementById('temple-list');
    if (!templeList) return;
    if (window._sidebarToMapSyncActive) return;
    window._sidebarToMapSyncActive = true;
    
    templeList.addEventListener('click', function(e) {
      var entry = e.target.closest && e.target.closest('.dd-temple-entry');
      if (!entry) return;
      var onclickAttr = entry.getAttribute('onclick') || '';
      var match = onclickAttr.match(/openTemplePopup\((\d+)\)/);
      if (!match) return;
      var sno = parseInt(match[1], 10);
      
      window.selectedTempleSno = sno;
      applyMarkerSelection(sno);
      setTimeout(function() { highlightSidebarEntry(sno); }, 30);
      
      var marker = window.templeMarkersMap[sno];
      if (marker && window.leafletMap) {
        var latlng = marker.getLatLng();
        window.leafletMap.flyTo(latlng, Math.max(window.leafletMap.getZoom(), 11), {
          animate: true,
          duration: 0.8
        });
      }
    }, true);
    
    console.log('[map] Sidebar-to-map sync active');
  }
  
  window.applyMarkerSelection = applyMarkerSelection;
  window.highlightSidebarEntry = highlightSidebarEntry;
  window.buildPreviewCardHtml = buildPreviewCardHtml;
  
  function refreshMapMarkers() {
    /* STEP_5_4_FULL_FEATURE — Idempotent refresh with selection + preview preservation */
    if (!window.templeMarkersGroup) return;
    
    var searchQuery = (window.sidebarSearchQuery || '').toLowerCase().trim();
    var activeChip = window.activeNaduChip || 'all';
    
    var visible = 0;
    var visibleSnos = [];
    
    window.DIVYA_DESAMS.forEach(function(temple) {
      if (temple.is_celestial) return;
      if (!temple.lat || !temple.lng) return;
      
      var marker = window.templeMarkersMap[temple.sno];
      if (!marker) return;
      
      if (typeof window.getFieldValue === 'function') {
        var newTooltipText = window.getFieldValue(temple, 'temple_name_short') || window.getFieldValue(temple, 'temple_name');
        var existingTooltip = marker.getTooltip();
        if (existingTooltip && newTooltipText) {
          existingTooltip.setContent(String(newTooltipText));
        }
      }
      
      if (typeof window.buildPreviewCardHtml === 'function') {
        try {
          var newPreviewHtml = window.buildPreviewCardHtml(temple);
          marker.setPopupContent(newPreviewHtml);
        } catch(e) {}
      }
      
      var passes = true;
      
      if (searchQuery.length > 0) {
        var searchText = [
          temple.temple_name || '',
          temple.temple_name_ta || '',
          temple.temple_name_short || '',
          temple.temple_name_short_ta || '',
          temple.town || '',
          temple.town_ta || '',
          temple.region || ''
        ].join(' ').toLowerCase();
        passes = searchText.indexOf(searchQuery) !== -1;
      } else if (activeChip !== 'all') {
        if (activeChip === 'abhimana') {
          passes = !!temple.is_abhimana;
        } else {
          passes = !temple.is_abhimana && temple.region === activeChip;
        }
      }
      
      var isCurrentlyInGroup = window.templeMarkersGroup.hasLayer(marker);
      
      if (passes) {
        if (!isCurrentlyInGroup) {
          window.templeMarkersGroup.addLayer(marker);
        }
        visible++;
        visibleSnos.push(temple.sno);
      } else {
        if (isCurrentlyInGroup) {
          window.templeMarkersGroup.removeLayer(marker);
        }
      }
    });
    
    if (window.selectedTempleSno && typeof window.applyMarkerSelection === 'function') {
      setTimeout(function() {
        window.applyMarkerSelection(window.selectedTempleSno);
      }, 50);
    }
    
    console.log('[map] ' + visible + ' markers visible after refresh (SNos: ' + visibleSnos.join(',') + ')');
  }
  
  function setupMapSync() {
    var templeList = document.getElementById('temple-list');
    if (!templeList) return;
    if (window._mapSyncActive) return;
    window._mapSyncActive = true;
    
    var syncTimer = null;
    var observer = new MutationObserver(function() {
      clearTimeout(syncTimer);
      syncTimer = setTimeout(refreshMapMarkers, 50);
    });
    
    observer.observe(templeList, { childList: true, subtree: false });
    console.log('[map] Sidebar-map sync active via MutationObserver');
  }
  
  window.initMapMarkers = initMapMarkers;
  window.refreshMapMarkers = refreshMapMarkers;
  
  // Start when DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMapMarkers);
  } else {
    initMapMarkers();
  }
})();
</script>
</body>
</html>
